apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-sensor-dashboard
  labels:
    app: bridge-sensor-dashboard
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bridge-sensor-dashboard
  template:
    metadata:
      labels:
        app: bridge-sensor-dashboard
    spec:
      containers:
      - name: bridge-sensor-dashboard
        image: bigkola1/bridge-sensor-dashboard:latest
        ports:
        - containerPort: 80
