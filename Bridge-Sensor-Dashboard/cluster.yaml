apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: sensor-cluster
  region: us-east-1
  version: "1.30"

managedNodeGroups:
  - name: ng-on-demand
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    ssh:
      allow: true
      publicKeyName: Bridge-Sensor-KP
    labels:
      role: workers
